project:
  name: market-attractor-mcts
  seed: 42
data:
  tickers:
  - SPY
  - QQQ
  - IWM
  - TLT
  - GLD
  - ^VIX
  start_date: '2010-01-01'
  end_date: null
features:
  volatility_windows:
  - 20
  - 60
  ma_windows:
  - 50
  - 200
  relative_strength_windows:
  - 20
  - 60
  vix_z_window: 60
regime:
  n_regimes: 4
  kmeans_n_init: 20
  hmm_covariance_type: diag
  hmm_n_iter: 500
backtest:
  initial_capital: 1.0
  trading_days: 252
  transaction_cost_bps: 2.0
  vol_target_annual: 0.1
  max_leverage: 1.0
  ma_window: 200
  regime_rule_safe_assets:
  - TLT
  - GLD
mcts:
  asset: SPY
  positions:
  - 0.0
  - 0.25
  - 0.5
  - 0.75
  - 1.0
  horizon: 5
  simulations_per_day: 100
  exploration_constant: 1.41421356237
  sampler: path
  use_full_action_grid: false
  prior_band: 0.5
  drawdown_penalty: 0.1
  opportunity_cost_weight: 0.2
  action_inertia_threshold: 0.0005
  multi_asset_hold_rollout_prob: 0.95
  multi_asset_action_inertia_threshold: 0.001
  transaction_cost_bps: 2.0
experiment:
  name: exp_sampler_path
  description: MCTS samples contiguous return paths from dates in the same regime.
  hypothesis: Path sampling preserves short-horizon return structure and improves
    MCTS decisions.
  changed_variable: mcts.sampler
  baseline_experiment: benchmark_v1
  expected_result: Sharpe or CAGR improves versus exp_sampler_daily.
  success_criteria: SPY MCTS gate remains WEAK PASS or better and beats daily sampler
    on Sharpe.
